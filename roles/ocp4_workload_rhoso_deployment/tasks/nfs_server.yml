---
- name: Create NFS directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0777"
  loop:
  - "{{ ocp4_workload_rhoso_deployment_nfs_cinder_path }}"
  - "{{ ocp4_workload_rhoso_deployment_nfs_glance_path }}"
  - "{{ ocp4_workload_rhoso_deployment_nfs_aap_path }}"
  delegate_to: nfs-server
  become: true

- name: Configure NFS exports
  ansible.builtin.copy:
    content: |
      {{ ocp4_workload_rhoso_deployment_nfs_cinder_path }} *(rw,sync,no_root_squash)
      {{ ocp4_workload_rhoso_deployment_nfs_glance_path }} *(rw,sync,no_root_squash)
      {{ ocp4_workload_rhoso_deployment_nfs_aap_path }} *(rw,sync,no_root_squash)
    dest: /etc/exports
    backup: true
    mode: "0644"
  delegate_to: nfs-server
  become: true
  notify: Restart nfs-server

- name: Delete default wired connection
   ansible.builtin.command:
     cmd: nmcli con delete "Wired connection 1"
   delegate_to: nfs-server
   become: true
   ignore_errors: true
   changed_when: false

- name: Configure static network interface on NFS server
   ansible.builtin.command:
     cmd: >-
       nmcli con add con-name "static-eth1" ifname eth1
       type ethernet ip4 {{ ocp4_workload_rhoso_deployment_nfs_server_ip }}/24
   delegate_to: nfs-server
   become: true
   register: _ocp4_workload_rhoso_deployment_nfs_nmcli
   changed_when: >-
     'Connection successfully added' in
     (_ocp4_workload_rhoso_deployment_nfs_nmcli.stdout | default(''))
   failed_when: >-
     _ocp4_workload_rhoso_deployment_nfs_nmcli.rc != 0 and
     'already exists' not in (_ocp4_workload_rhoso_deployment_nfs_nmcli.stderr | default(''))

- name: Activate static network connection on NFS server
   ansible.builtin.command:
     cmd: nmcli con up "static-eth1"
   delegate_to: nfs-server
   become: true
   changed_when: true

- name: Start and enable NFS server
  ansible.builtin.systemd:
    name: nfs-server
    state: started
    enabled: true
  delegate_to: nfs-server
  become: true

- name: Export NFS shares
  ansible.builtin.command:
    cmd: exportfs -ra
  delegate_to: nfs-server
  become: true
  changed_when: true

- name: Verify NFS exports
  ansible.builtin.command:
    cmd: exportfs -v
  delegate_to: nfs-server
  become: true
  register: _ocp4_workload_rhoso_deployment_nfs_exports
  changed_when: false

- name: Display NFS exports
  ansible.builtin.debug:
    var: _ocp4_workload_rhoso_deployment_nfs_exports.stdout_lines
  delegate_to: bastion

- name: Create NFS StorageClass and PersistentVolume
  kubernetes.core.k8s:
    state: present
    definition:
    - apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: nfs
      provisioner: kubernetes.io/no-provisioner
      reclaimPolicy: Delete
    - apiVersion: v1
      kind: PersistentVolume
      metadata:
        name: nfs-pv1
      spec:
        accessModes:
        - ReadWriteOnce
        - ReadWriteMany
        capacity:
          storage: 10Gi
        nfs:
          path: "{{ ocp4_workload_rhoso_deployment_nfs_aap_path }}"
          server: "{{ ocp4_workload_rhoso_deployment_nfs_server_ip }}"
        persistentVolumeReclaimPolicy: Delete
        storageClassName: nfs
        volumeMode: Filesystem
  delegate_to: bastion

- name: Verify NFS StorageClass and PersistentVolume
  kubernetes.core.k8s_info:
    api_version: "{{ item.api_version }}"
    kind: "{{ item.kind }}"
    name: "{{ item.name }}"
  register: _ocp4_workload_rhoso_deployment_nfs_resources
  loop:
  - api_version: storage.k8s.io/v1
    kind: StorageClass
    name: nfs
  - api_version: v1
    kind: PersistentVolume
    name: nfs-pv1
  delegate_to: bastion

- name: Display NFS resource status
  ansible.builtin.debug:
    msg: >-
      {{ item.item.kind }} '{{ item.item.name }}' —
      {{ 'Found' if item.resources | length > 0 else 'Not Found' }}
  loop: "{{ _ocp4_workload_rhoso_deployment_nfs_resources.results }}"
  delegate_to: bastion
