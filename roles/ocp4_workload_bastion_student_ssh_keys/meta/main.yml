---
galaxy_info:
  role_name: ocp4_workload_bastion_student_ssh_keys
  author:
  - Judd Maltin <jmaltin@redhat.com>
  description: |
    Copies the bastion SSH private key, public key, and SSH config into the
    student user's ~/.ssh/ directory. This bridges the gap between the
    agnosticd-v2 bastion role (which only sets up keys for the ansible_user)
    and student users who need SSH access to other VMs in the environment.
  license: GPL-2.0-or-later
  min_ansible_version: "2.9"
  platforms: []
  galaxy_tags:
  - bastion
  - ssh
  - student
dependencies: []